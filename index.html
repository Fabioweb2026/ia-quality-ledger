<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>IA Quality Ledger</title>
  <style>
  <style>
    /* Estilização Temática: Dark Cyber-Enterprise Mode */
    body { 
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; 
      padding: 30px; 
      background-color: #0d1117; /* Fundo escuro padrão GitHub/Plataformas de IA */
      color: #c9d1d9; /* Texto claro de alta legibilidade */
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Logotipo Estilizado em Texto e Título */
    .header-container {
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #21262d;
      padding-bottom: 20px;
      margin-bottom: 25px;
    }
    .logo-icon {
      background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
      color: #0d1117;
      font-weight: 800;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 18px;
      letter-spacing: 1px;
      box-shadow: 0 0 15px rgba(79, 172, 254, 0.4);
    }
    h1 { 
      color: #ffffff; 
      margin: 0; 
      font-size: 28px; 
      font-weight: 700;
      background: linear-gradient(to right, #ffffff, #8b949e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    /* Grid de Estatísticas (Cards em Neon Sutil) */
    .stats-container { display: flex; gap: 20px; margin-bottom: 25px; }
    .stat-card { 
      background: #161b22; 
      padding: 20px; 
      border-radius: 10px; 
      border: 1px solid #30363d;
      flex: 1; 
      text-align: center;
      transition: transform 0.2s;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      border-color: #4facfe;
    }
    .stat-card h3 { margin: 0; color: #8b949e; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card p { margin: 8px 0 0 0; font-size: 28px; font-weight: bold; color: #58a6ff; }

    /* Formulário Estilizado (Dark Surface) */
    form { 
      background: #161b22; 
      padding: 25px; 
      border-radius: 10px; 
      border: 1px solid #30363d;
      margin-bottom: 35px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
    }
    .full-width { grid-column: span 2; }
    
    /* Inputs Estilo Terminal Moderno */
    input, select, textarea { 
      padding: 12px; 
      background-color: #0d1117;
      border: 1px solid #30363d; 
      border-radius: 6px; 
      font-size: 14px;
      color: #c9d1d9;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.15);
    }
    ::placeholder { color: #484f58; }
    textarea { height: 90px; resize: vertical; }
    
    /* Botões */
    .btn-container { grid-column: span 2; display: flex; gap: 12px; margin-top: 5px; }
    button { 
      padding: 12px 24px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px;
      transition: filter 0.2s;
    }
    button[type="submit"] { background: #238636; color: #ffffff; }
    button.btn-export { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
    button:hover { filter: brightness(1.15); }

    /* Tabela de Auditoria Dark */
    .table-container { 
      background: #161b22; 
      border-radius: 10px; 
      border: 1px solid #30363d; 
      overflow: hidden; 
    }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #21262d; font-size: 14px; }
    th { background: #1f242c; color: #f0f6fc; font-weight: 600; }
    tr:hover { background-color: #1f242c; }
    
    /* Badges com Brilho Sutil (Otimizadas para Fundo Escuro) */
    .badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; display: inline-block; }
    .badge-factualidade { background: rgba(248, 81, 73, 0.15); color: #ff7b72; border: 1px solid rgba(248, 81, 73, 0.3); }
    .badge-idioma { background: rgba(210, 153, 34, 0.15); color: #d29922; border: 1px solid rgba(210, 153, 34, 0.3); }
    .badge-seguranca { background: rgba(248, 81, 73, 0.25); color: #ff7b72; border: 1px solid #f85149; }
    .badge-instrucao { background: rgba(56, 139, 253, 0.15); color: #58a6ff; border: 1px solid rgba(56, 139, 253, 0.3); }
    .badge-formato { background: rgba(139, 148, 158, 0.15); color: #8b949e; border: 1px solid rgba(139, 148, 158, 0.3); }
    .badge-sem-erro { background: rgba(46, 160, 67, 0.15); color: #56d364; border: 1px solid rgba(46, 160, 67, 0.3); }
  </style>
</head>
<body>

  <h1>IA Quality Ledger</h1>
  
  <!-- Painel de Estatísticas rápidas -->
  <div class="stats-container">
    <div class="stat-card">
      <h3>Média Geral</h3>
      <p id="mediaNota">0.00</p>
    </div>
    <div class="stat-card">
      <h3>Total de Avaliações</h3>
      <p id="totalAvaliacoes">0</p>
    </div>
  </div>
  
  <form id="form">
    <input type="text" id="promptId" placeholder="Prompt ID" required>
    <select id="nota" required>
      <option value="">Nota 1-5</option>
      <option value="1">1</option><option value="2">2</option>
      <option value="3">3</option><option value="4">4</option>
      <option value="5">5</option>
    </select>
    <textarea id="resposta" class="full-width" placeholder="Resposta da IA" required></textarea>
    
    <!-- Campo de erro envelopado em uma div para controle fácil -->
    <div id="wrapperErro" style="display: flex; flex-direction: column;">
      <select id="tipoErro">
        <option value="">Sem erro</option>
        <option value="Factualidade">Factualidade</option>
        <option value="Idioma/PT-BR">Idioma/PT-BR</option>
        <option value="Segurança">Segurança</option>
        <option value="Instrução">Instrução</option>
        <option value="Formato">Formato</option>
      </select>
    </div>
    <input type="text" id="comentario" placeholder="Comentário do auditor">
    
    <div class="btn-container">
      <button type="submit">Adicionar Log</button>
      <button type="button" class="btn-export" onclick="exportCSV()">Exportar CSV</button>
    </div>
  </form>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Prompt ID</th>
          <th>Resposta IA</th>
          <th>Nota</th>
          <th>Tipo de Erro</th>
          <th>Comentário</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

<script>
// Array global que gerencia os dados da aplicação
let registros = [];

// Carrega os dados salvos no navegador assim que a página abre
window.addEventListener('DOMContentLoaded', () => {
  const dadosSalvos = localStorage.getItem('ia_quality_ledger_logs');
  if (dadosSalvos) {
    registros = JSON.parse(dadosSalvos);
    renderizarTabela();
    atualizarEstatisticas();
  }
});

// UX Dinâmica: Oculta o campo de erro se a nota for máxima (5)
document.getElementById('nota').addEventListener('change', function() {
  const wrapperErro = document.getElementById('wrapperErro');
  const tipoErro = document.getElementById('tipoErro');
  
  if (this.value === "5") {
    tipoErro.value = ""; // Reseta para sem erro
    wrapperErro.style.visibility = "hidden"; // Esconde visualmente mantendo o layout
  } else {
    wrapperErro.style.visibility = "visible";
  }
});

// Captura o envio do formulário
document.getElementById('form').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const novoRegistro = {
    data: new Date().toLocaleDateString('pt-BR'),
    promptId: document.getElementById('promptId').value,
    resposta: document.getElementById('resposta').value,
    nota: Number(document.getElementById('nota').value),
    tipoErro: document.getElementById('tipoErro').value || "Sem erro",
    comentario: document.getElementById('comentario').value || "-"
  };

  registros.push(novoRegistro);
  
  // Salva no LocalStorage (Navegador)
  localStorage.setItem('ia_quality_ledger_logs', JSON.stringify(registros));

  // Atualiza a tela
  renderizarTabela();
  atualizarEstatisticas();

  // Reseta o formulário e força a exibição do bloco de erros novamente
  e.target.reset();
  document.getElementById('wrapperErro').style.visibility = "visible";
});

// Função para desenhar as linhas na tabela com base no array
function renderizarTabela() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = ""; // Limpa a tabela antes de redesenhar

  registros.forEach(reg => {
    // Escolhe a classe CSS certa para colorir o badge do erro
    let classeBadge = "badge-sem-erro";
    if (reg.tipoErro.includes("Factualidade")) classeBadge = "badge-factualidade";
    if (reg.tipoErro.includes("Idioma")) classeBadge = "badge-idioma";
    if (reg.tipoErro.includes("Segurança")) classeBadge = "badge-seguranca";
    if (reg.tipoErro.includes("Instrução")) classeBadge = "badge-instrucao";
    if (reg.tipoErro.includes("Formato")) classeBadge = "badge-formato";

    const row = `<tr>
      <td>${reg.data}</td>
      <td><strong>${reg.promptId}</strong></td>
      <td>${reg.resposta}</td>
      <td><strong>${reg.nota}</strong>/5</td>
      <td><span class="badge ${classeBadge}">${reg.tipoErro}</span></td>
      <td>${reg.comentario}</td>
    </tr>`;
    tbody.insertAdjacentHTML('beforeend', row);
  });
}

// Recalcula os indicadores do topo
function atualizarEstatisticas() {
  const totalAvaliacoes = registros.length;
  document.getElementById('totalAvaliacoes').innerText = totalAvaliacoes;

  if (totalAvaliacoes === 0) {
    document.getElementById('mediaNota').innerText = "0.00";
    return;
  }

  const somaNotas = registros.reduce((acc, curr) => acc + curr.nota, 0);
  const media = (somaNotas / totalAvaliacoes).toFixed(2);
  document.getElementById('mediaNota').innerText = media;
}

// Exportador para CSV estruturado
function exportCSV() {
  if (registros.length === 0) {
    alert("Não há dados para exportar!");
    return;
  }

  // Cabeçalho com codificação UTF-8 para não quebrar acentos no Excel
  let csvContent = "\uFEFFData;Prompt ID;Resposta IA;Nota;Tipo de Erro;Comentario\n";
  
  registros.forEach(reg => {
    // Limpa quebras de linhas nas respostas para não quebrar o arquivo CSV
    const respostaLimpa = reg.resposta.replace(/[\n\r]/g, " ");
    csvContent += `${reg.data};${reg.promptId};"${respostaLimpa}";${reg.nota};${reg.tipoErro};"${reg.comentario}"\n`;
  });

  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", "ia_quality_ledger_report.csv");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>
</body>
</html>
